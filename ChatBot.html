<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medication Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
        }

        .message-enter {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        /* Dropdown transition */
        .dropdown-content {
            display: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .dropdown-content.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden flex flex-col pt-4 px-4 pb-6"
        style="height: calc(100vh - 40px); max-height: 800px;">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4 relative z-20 px-2">
            <h2 id="chat-title" class="text-xl font-bold text-gray-800">🤖 AI Medication Assistant</h2>
            <div class="relative">
                <button id="lang-btn"
                    class="flex items-center gap-2 border border-gray-200 rounded-full h-10 px-4 text-sm font-medium hover:bg-gray-50 transition-colors bg-white">
                    <i data-lucide="globe" class="w-4 h-4 text-gray-500"></i>
                    <span id="lang-flag">🇺🇸</span>
                    <span id="lang-label" class="hidden sm:inline text-gray-700">English</span>
                </button>
                <div id="lang-dropdown"
                    class="dropdown-content absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1">
                    <!-- Dropdown items will be injected here -->
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto space-y-4 mb-4 px-2">
            <!-- Messages will be injected here -->
        </div>

        <!-- Quick Questions -->
        <div id="quick-questions" class="flex flex-wrap gap-2 mb-4 px-2">
            <!-- Quick questions will be injected here -->
        </div>

        <!-- Input -->
        <div class="flex gap-2 px-2 pb-2">
            <button
                class="border border-gray-200 hover:bg-gray-50 text-gray-600 rounded-full shrink-0 h-10 w-10 flex items-center justify-center transition-colors">
                <i data-lucide="mic" class="w-5 h-5"></i>
            </button>
            <input id="chat-input" type="text" placeholder="Ask about your medications..."
                class="flex-1 border border-gray-200 rounded-full h-10 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-700">
            <button id="send-btn"
                class="bg-blue-600 hover:bg-blue-700 text-white rounded-full shrink-0 h-10 w-10 flex items-center justify-center transition-colors shadow-md">
                <i data-lucide="send" class="w-4 h-4 ml-1"></i>
            </button>
        </div>
    </div>

    <script>
        const languages = {
            ko: {
                label: "한국어",
                flag: "🇰🇷",
                greeting: "안녕하세요! 약이든 AI 도우미입니다. 😊\n\n약에 대해 궁금한 것이 있으시면 편하게 물어보세요. 음성으로도 질문하실 수 있습니다.",
                placeholder: "약에 대해 물어보세요...",
                title: "🤖 AI 약 도우미",
                pendingReply: "죄송합니다. 현재 AI 기능이 준비 중입니다. 곧 답변을 드릴 수 있도록 하겠습니다! 🙏",
                quickQuestions: ["혈압약 부작용이 뭔가요?", "약 먹는 시간을 놓쳤어요", "두 약을 같이 먹어도 되나요?", "오늘 복약 일정 알려주세요"],
            },
            en: {
                label: "English",
                flag: "🇺🇸",
                greeting: "Hello! I'm your MediTrack AI assistant. 😊\n\nFeel free to ask me anything about your medications. You can also use voice input.",
                placeholder: "Ask about your medications...",
                title: "🤖 AI Medication Assistant",
                pendingReply: "Sorry, the AI feature is currently being prepared. We'll be able to answer soon! 🙏",
                quickQuestions: ["What are the side effects of blood pressure meds?", "I missed my medication time", "Can I take two drugs together?", "Show today's medication schedule"],
            },
            ja: {
                label: "日本語",
                flag: "🇯🇵",
                greeting: "こんにちは！薬トラックAIアシスタントです。😊\n\nお薬について何でもお気軽にご質問ください。音声入力もご利用いただけます。",
                placeholder: "お薬について質問してください...",
                title: "🤖 AI お薬アシスタント",
                pendingReply: "申し訳ございません。現在AI機能を準備中です。まもなくお答えできるようになります！🙏",
                quickQuestions: ["血圧薬の副作用は？", "薬を飲む時間を逃しました", "2つの薬を一緒に飲めますか？", "今日の服薬スケジュールを教えて"],
            },
            zh: {
                label: "中文",
                flag: "🇨🇳",
                greeting: "您好！我是您的药物追踪AI助手。😊\n\n如有任何关于药物的问题，请随时提问。您也可以使用语音输入。",
                placeholder: "询问关于药物的问题...",
                title: "🤖 AI 药物助手",
                pendingReply: "抱歉，AI功能正在准备中。我们很快就能为您解答！🙏",
                quickQuestions: ["降压药有什么副作用？", "我错过了吃药时间", "两种药可以一起吃吗？", "显示今天的用药时间表"],
            },
            vi: {
                label: "Tiếng Việt",
                flag: "🇻🇳",
                greeting: "Xin chào! Tôi là trợ lý AI theo dõi thuốc. 😊\n\nHãy hỏi bất cứ điều gì về thuốc của bạn. Bạn cũng có thể sử dụng giọng nói.",
                placeholder: "Hỏi về thuốc của bạn...",
                title: "🤖 Trợ lý AI Thuốc",
                pendingReply: "Xin lỗi, tính năng AI đang được chuẩn bị. Chúng tôi sẽ sớm trả lời! 🙏",
                quickQuestions: ["Tác dụng phụ của thuốc huyết áp?", "Tôi bỏ lỡ giờ uống thuốc", "Có thể uống hai thuốc cùng lúc?", "Lịch uống thuốc hôm nay"],
            },
            es: {
                label: "Español",
                flag: "🇪🇸",
                greeting: "¡Hola! Soy tu asistente de medicación con IA. 😊\n\nNo dudes en preguntarme sobre tus medicamentos. También puedes usar la entrada de voz.",
                placeholder: "Pregunta sobre tus medicamentos...",
                title: "🤖 Asistente de Medicación IA",
                pendingReply: "Lo siento, la función de IA está en preparación. ¡Pronto podremos responder! 🙏",
                quickQuestions: ["¿Efectos secundarios de medicamentos para la presión?", "Se me pasó la hora de la medicina", "¿Puedo tomar dos medicinas juntas?", "Muestra el horario de hoy"],
            },
        };

        let currentLang = "ko";
        let messages = [];


        // DOM Elements
        const chatTitle = document.getElementById("chat-title");
        const langBtn = document.getElementById("lang-btn");
        const langFlag = document.getElementById("lang-flag");
        const langLabel = document.getElementById("lang-label");
        const langDropdown = document.getElementById("lang-dropdown");
        const messagesContainer = document.getElementById("messages-container");
        const quickQuestionsContainer = document.getElementById("quick-questions");
        const chatInput = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");

        // Initialize
        function init() {
            renderDropdown();
            setLanguage("ko");
            lucide.createIcons();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Dropdown toggle
            langBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                langDropdown.classList.toggle("show");
            });

            // Close dropdown when clicking outside
            document.addEventListener("click", () => {
                if (langDropdown.classList.contains("show")) {
                    langDropdown.classList.remove("show");
                }
            });

            // Send on click
            sendBtn.addEventListener("click", handleSend);

            // Send on enter
            chatInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") handleSend();
            });
        }

        function renderDropdown() {
            langDropdown.innerHTML = Object.keys(languages).map(code => {
                const lang = languages[code];
                const isSelected = code === currentLang;
                return `
            <div onclick="setLanguage('${code}')" class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors ${isSelected ? 'bg-blue-50/50' : ''}">
                <span class="flex items-center gap-3 text-sm font-medium text-gray-700">
                    <span class="text-lg">${lang.flag}</span>
                    ${lang.label}
                </span>
                ${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-blue-600"></i>' : ''}
            </div>
        `;
            }).join("");
            lucide.createIcons({ root: langDropdown });
        }

        function setLanguage(code) {
            if (currentLang !== code && messages.length > 0) {
                messages = []; // Optional: clear messages on switch
            }

            currentLang = code;
            const config = languages[code];

            // Update Header
            chatTitle.innerText = config.title;
            langFlag.innerText = config.flag;
            langLabel.innerText = config.label;
            chatInput.placeholder = config.placeholder;

            // Initial message
            if (messages.length === 0) {
                messages = [{ role: 'assistant', content: config.greeting }];
            }

            renderDropdown();
            renderMessages();
            renderQuickQuestions();
        }

        function renderMessages() {
            messagesContainer.innerHTML = messages.map(msg => {
                const isUser = msg.role === "user";
                return `
            <div class="flex gap-3 message-enter ${isUser ? 'flex-row-reverse' : ''}">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm ${isUser ? 'bg-gray-100 text-gray-600' : 'bg-blue-600 text-white'
                    }">
                    <i data-lucide="${isUser ? 'user' : 'bot'}" class="w-5 h-5"></i>
                </div>
                <div class="max-w-[80%] rounded-2xl p-4 text-sm sm:text-base ${isUser
                        ? 'bg-blue-600 text-white shadow-sm'
                        : 'bg-white border border-gray-100 text-gray-800 shadow-sm'
                    }" style="white-space: pre-wrap; word-break: break-word;">
                    ${msg.content}
                </div>
            </div>
        `;
            }).join("");

            lucide.createIcons({ root: messagesContainer });

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Manage quick questions visibility
            if (messages.length > 1) {
                quickQuestionsContainer.style.display = 'none';
            } else {
                quickQuestionsContainer.style.display = 'flex';
            }
        }

        function renderQuickQuestions() {
            const config = languages[currentLang];
            quickQuestionsContainer.innerHTML = config.quickQuestions.map(q =>
                `<button onclick="handleQuickQuestion('${q}')" class="bg-white border border-blue-200 text-blue-600 hover:bg-blue-50 text-sm py-1.5 px-3 rounded-full transition-colors shadow-sm whitespace-nowrap">${q}</button>`
            ).join("");
        }

        function handleQuickQuestion(q) {
            chatInput.value = q;
            handleSend();
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Add user message
            messages.push({ role: "user", content: text });
            chatInput.value = "";
            renderMessages();

            const currentConfig = languages[currentLang];

            try {
                // Try calling the Python backend
                const response = await fetch('http://localhost:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, lang: currentLang })
                });

                if (response.ok) {
                    const data = await response.json();
                    setTimeout(() => {
                        messages.push({ role: "assistant", content: data.reply });
                        renderMessages();
                    }, 500);
                } else {
                    throw new Error("Backend not available");
                }
            } catch (e) {
                // Fallback to local interaction
                setTimeout(() => {
                    messages.push({ role: "assistant", content: currentConfig.pendingReply });
                    renderMessages();
                }, 1000);
            }
        }

        // Start app
        init();
    </script>
</body>

</html>
